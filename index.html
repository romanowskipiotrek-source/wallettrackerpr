        return 'https://cors.bridged.cc/';

        console.log('🌐 Netlify detected - using Netlify Function proxy');
        return '/.netlify/functions/cors-proxy?url=';

      // Any other web server (localhost, etc.)
      else {
        // Use cors.bridged.cc as fallback
        console.log('🖥️ Web server detected - using cors.bridged.cc proxy');

                            const title = titleMatch ? titleMatch[2] : '';
                            const content = titleMatch ? section.replace(titleMatch[0], '').trim() : section.trim();
                            
                            // Skip sections with preamble titles (starting with * or generic intro)
                            if (title.startsWith('*') || title.toLowerCase().includes('comprehensive investment analysis')) return null;
                            
                            // Skip sections with only single character content or title
                            if (title.length === 1 || content.length === 1) return null;
                            
                            // Skip empty content sections
                            if (!content || content.length < 5) return null;
                            
                            // Choose icon based on section title

                            if (title.toLowerCase().includes('recommendation')) icon = '💡';
                            if (title.toLowerCase().includes('market')) icon = '🌍';

                                      // Skip markdown section separators and headers

                                      if (trimmed.match(/^#{1,6}\s+.+$/)) return null; // Hashes with text: ### Section
                                      if (trimmed.match(/^[-*_]{3,}$/)) return null; // Horizontal rules: ---, ***, ___

                        // Icon mapping

                        let iconBg = 'bg-blue-500/10';
                        let iconColor = 'text-blue-600 dark:text-blue-400';
                        
                        if (title.toLowerCase().includes('overview') || title.toLowerCase().includes('company')) {

                          iconBg = 'bg-slate-500/10';
                          iconColor = 'text-slate-600 dark:text-slate-400';

                          iconBg = 'bg-purple-500/10';
                          iconColor = 'text-purple-600 dark:text-purple-400';

                          iconBg = 'bg-cyan-500/10';
                          iconColor = 'text-cyan-600 dark:text-cyan-400';

                          iconBg = 'bg-amber-500/10';
                          iconColor = 'text-amber-600 dark:text-amber-400';

                          iconColor = 'text-blue-600 dark:text-blue-400';

                                </div>
                              </div>
                            )}
                            <div className="px-4 py-3">
                              <div className="space-y-2 text-sm">
                                {content.split('\n').map((line, lineIdx) => {
                                  const trimmed = line.trim();
                                  
                                  // Skip empty lines
                                  if (!trimmed) return null;
                                  
                                  // Skip markdown section separators and headers
                                  if (trimmed.match(/^#{1,6}\s*$/)) return null; // Just hashes: ###
                                  if (trimmed.match(/^#{1,6}\s+.+$/)) return null; // Hashes with text: ### Section
                                  if (trimmed.match(/^[-*_]{3,}$/)) return null; // Horizontal rules: ---, ***, ___
                                  
                                  // Bullet points
                                  if (trimmed.startsWith('•') || trimmed.startsWith('-') || trimmed.startsWith('*')) {
                                    const text = trimmed.substring(1).trim().replace(/^\*\*|\*\*$/g, '');
                                    return (
                                      <div key={lineIdx} className="flex gap-2 items-start">
                                        <span className="text-blue-500 dark:text-blue-400 font-bold mt-0.5 flex-shrink-0">•</span>
                                        <span className="text-slate-700 dark:text-slate-300 leading-snug flex-1">{text}</span>
                                      </div>
                                    );
                                  }
                                  
                                  // Sub-headings
                                  if (trimmed.startsWith('**') && trimmed.endsWith('**')) {
                                    const text = trimmed.replace(/\*\*/g, '');
                                    return (
                                      <h5 key={lineIdx} className="font-semibold text-slate-900 dark:text-slate-100 mt-2 mb-1 text-xs uppercase tracking-wide">
                                        {text}
                                      </h5>
                                    );
                                  }
                                  
                                  // Regular paragraphs with bold support
                                  const formatted = trimmed.replace(/\*\*([^*]+)\*\*/g, '<strong class="font-semibold text-slate-900 dark:text-slate-100">$1</strong>');
                                  
                                  return (
                                    <p key={lineIdx} className="text-slate-600 dark:text-slate-400 leading-relaxed" dangerouslySetInnerHTML={{__html: formatted}}></p>

                        return `${diffDays}d ago`;

                        className="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 focus:border-transparent text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500"
                      />
                      {authMode === 'signup' && (
                        <p className="mt-1 text-xs text-slate-500 dark:text-slate-400">
                          Minimum 6 characters
                        </p>
                      )}
                    </div>
                    
                    <button
                      type="submit"
                      className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-medium py-3 rounded-lg transition-all shadow-lg hover:shadow-xl"
                    >
                      {authMode === 'login' ? 'Login' : 'Create Account'}
                    </button>
                  </form>
                  
                  {/* Info */}
                  <div className="mt-6 p-4 bg-blue-50 dark:bg-blue-900/20 rounded-lg">
                    <div className="flex gap-3">
                      <span className="text-2xl">ℹ️</span>
                      <div className="text-xs text-blue-700 dark:text-blue-300">
                        <p className="font-medium mb-1">Free cloud storage powered by Supabase</p>
                        <ul className="space-y-1 opacity-80">
                          <li>✓ Access from any device</li>
                          <li>✓ Automatic backup</li>
                          <li>✓ Secure & encrypted</li>
                          <li>✓ 500MB storage free forever</li>
                        </ul>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PortfolioManager />);
  </script>
</body>
</html>
